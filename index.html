<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══ LOADING SCREEN ══ -->
  <div id="loading">
    <span>Loading…</span>
  </div>

  <!-- ══ LOGIN SCREEN ══ -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">COMMAND CENTRE</div>
        <p class="login-sub">Sign in to continue</p>
      </div>
      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input type="email" id="login-email" class="form-input" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="login-btn" class="btn-primary btn-full" onclick="handleLogin()">Log In</button>
      <p id="login-error" class="login-error hidden">Incorrect email or password. Please try again.</p>
    </div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div id="dashboard" class="hidden">

    <!-- Row 1: Topbar -->
    <div id="topbar">
      <div class="topbar-logo">COMMAND CENTRE</div>
      <div class="user-chip" id="user-chip" onclick="toggleUserMenu()">
        <div class="avatar" id="avatar-initials">OW</div>
        <span id="owner-name-label">Owner</span>
        <div id="user-menu" class="user-menu hidden">
          <button onclick="handleLogout()">Log out</button>
        </div>
      </div>
    </div>

    <!-- Row 2: App Row (product switcher) -->
    <div id="app-row">
      <div id="product-buttons"></div>
      <button class="btn-add-product" onclick="openAddProductModal()" title="Add product">+</button>
    </div>

    <!-- Row 3: Section Row -->
    <div id="section-row">
      <div id="section-tabs"></div>
      <div class="section-actions">
        <button class="btn-share-board" onclick="shareBoardLink()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          <span class="share-text">Share Board</span>
        </button>
        <button class="btn-new-brief" onclick="openNewBriefModal()">+ New Brief</button>
      </div>
    </div>

    <!-- Row 4: Content Area -->
    <div id="content-area">
      <div id="card-grid"></div>
    </div>

  </div>

  <!-- ══ BOARD VIEWER (share link) ══ -->
  <div id="board-viewer" class="hidden">
    <div id="board-viewer-inner"></div>
  </div>

  <!-- ══ CARD VIEWER (share link) ══ -->
  <div id="card-viewer-page" class="hidden">
    <div id="card-viewer-inner"></div>
  </div>

  <!-- ══ LINK EXPIRED ══ -->
  <div id="link-expired" class="hidden">
    <p>This link is no longer active.</p>
  </div>

  <!-- ══ MODAL OVERLAY ══ -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">

    <!-- New / Edit Brief Modal -->
    <div id="brief-modal" class="modal hidden">
      <div class="modal-header">
        <h2 class="modal-title" id="brief-modal-title">New Brief</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">TITLE</label>
          <input type="text" id="brief-title" class="form-input" placeholder="What is this brief about?">
        </div>
        <div class="form-group">
          <label class="form-label">CONTENT / BRIEF</label>
          <textarea id="brief-body" class="form-textarea" placeholder="Paste your copy, brief, instructions, growth idea, or any content here..."></textarea>
        </div>
        <div class="form-grid-3">
          <div class="form-group">
            <label class="form-label">SECTION</label>
            <select id="brief-section" class="form-select"></select>
          </div>
          <div class="form-group">
            <label class="form-label">PRIORITY</label>
            <select id="brief-priority" class="form-select">
              <option>High</option>
              <option selected>Medium</option>
              <option>Low</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">STATUS</label>
            <select id="brief-status" class="form-select">
              <option selected>To Do</option>
              <option>In Progress</option>
              <option>Done</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">ATTACHMENT URL <span class="form-optional">(optional)</span></label>
          <input type="text" id="brief-attachment" class="form-input" placeholder="Paste image, PDF, or file link">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="brief-save-btn" onclick="saveBrief()">Save Brief</button>
      </div>
    </div>

    <!-- View Modal (expanded card) -->
    <div id="view-modal" class="modal view-modal hidden">
      <div class="view-top">
        <h2 class="view-title" id="view-title"></h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="view-meta" id="view-meta"></div>
      <div class="view-body" id="view-body"></div>
      <div class="view-attachments" id="view-attachments"></div>
    </div>

    <!-- Delete Section Confirmation Modal -->
    <div id="delete-section-modal" class="modal modal-sm hidden">
      <div class="modal-header">
        <h2 class="modal-title">Delete Section</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <p class="delete-warning">
          This will permanently delete the <strong id="delete-section-label"></strong> section
          and <strong>all briefs inside it</strong>. This cannot be undone.
        </p>
        <div class="form-group">
          <label class="form-label">Type the section name to confirm</label>
          <input type="text" id="delete-section-confirm" class="form-input"
            oninput="checkDeleteConfirm()" autocomplete="off">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-danger" id="delete-section-btn" onclick="confirmDeleteSection()" disabled>Delete Section</button>
      </div>
    </div>

    <!-- Add Product Modal -->
    <div id="add-product-modal" class="modal modal-sm hidden">
      <div class="modal-header">
        <h2 class="modal-title">Add Product</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">PRODUCT NAME</label>
          <input type="text" id="product-name-input" class="form-input" placeholder="e.g. FlightPoints"
            onkeydown="if(event.key==='Enter') addProduct()">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="addProduct()">Add Product</button>
      </div>
    </div>

  </div>

  <!-- ══ LIGHTBOX ══ -->
  <div id="lightbox" class="lightbox hidden" onclick="handleLightboxClick(event)">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-filename" id="lightbox-filename"></div>
  </div>

  <!-- ══ TOAST ══ -->
  <div id="toast" class="toast hidden">
    <div class="toast-dot"></div>
    <span id="toast-msg"></span>
  </div>

  <!-- app.js is an ES module — it imports firebase.js automatically -->
  <script type="module" src="app.js"></script>
</body>
</html>
